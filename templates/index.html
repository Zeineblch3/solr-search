<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Document Search</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
        body{
            background: linear-gradient(135deg,#eef2f7,#dce7f3);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, sans-serif;
        }

        .upload-card{
            width:450px;
            padding:40px;
            border-radius:15px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
            text-align:center;
        }

        .upload-title{
            font-weight:600;
            margin-bottom:25px;
        }

        .upload-btn{
            width:100%;
        }
        </style>

    </head>

    <body>

        <div class="upload-card">

            <h2 class="upload-title">📄 Document Search</h2>

            <p class="text-muted mb-4">
                Upload a document to index it in the search engine
            </p>

            <form action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <input class="form-control" type="file" name="file" required>
                </div>

                <button class="btn btn-primary upload-btn" type="submit">
                    Upload Document
                </button>

            </form>
            <div class="mt-4">

                <a href="/search" class="btn btn-outline-primary w-100">
                Search Documents
                </a>

                </div>

        </div>

    </body>
</html>
