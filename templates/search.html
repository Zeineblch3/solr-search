<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg,#eef2f7,#dce7f3);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            font-family: Arial, sans-serif;
            padding-top:80px;
        }
        .search-card{
            width:650px;
            padding:40px;
            border-radius:15px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }
        .container{
            margin-top:50px;
            max-width:800px;
        }
        .search-box{
            display:flex;
            margin-bottom:30px;
        }
        .search-box input{
            flex:1;
            padding:10px;
            font-size:16px;
        }
        .search-box button{
            padding:10px 20px;
        }
        .result-card{
            background:white;
            padding:15px 20px;
            border-radius:8px;
            margin-bottom:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .result-title{
            font-size:18px;
            font-weight:600;
            margin-bottom:5px;
        }
        .result-content{
            color:#555;
            font-size:14px;
            max-height:100px;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .search-title{
            text-align:center;
            font-weight:600;
            margin-bottom:25px;
        }
        .result-score{
            font-size:12px;
            color:#888;
        }
    </style>
</head>
<body>
    <div class="search-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="/" class="btn btn-outline-secondary btn-sm">← Home</a>
        </div>

        <h2 class="search-title">🔎 Document Search</h2>
        <form class="search-box" action="/search" method="get">
            <input type="text" name="q" value="" placeholder="Search documents..." required>
            <button class="btn btn-primary" type="submit">Search</button>
        </form>

        <ul id="suggestions" class="list-group mt-2"></ul>

        {% if docs %}
            {% for doc in docs %}
            <div class="result-card">
                <div class="result-title">{{ doc.title[0] }}</div>
                <div class="result-score">
                    Score: {{ doc.score }}
                </div>
                <div class="result-content">{{ doc.content[0][:300] }}...</div>
                <a href="{{ url_for('uploaded_file', filename=doc.title[0]) }}" target="_blank">Open document</a>
            </div>
            {% endfor %}
        {% else %}
            <p>No results found</p>
        {% endif %}
    </div>

   <script>
        const input = document.querySelector("input[name='q']");
        const list = document.getElementById("suggestions");

        input.addEventListener("input", async () => {
            let res = await fetch(`/autocomplete?term=${input.value}`);
            let data = await res.json();

            list.innerHTML = "";

            data.suggestions.forEach(s => {
                let li = document.createElement("li");
                li.className = "list-group-item";
                li.textContent = s;

                li.onclick = () => {
                    input.value = s;
                    list.innerHTML = "";
                };

                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
